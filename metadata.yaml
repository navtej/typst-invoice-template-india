doc-info:
  id:
    prefix: INV
    separator: /
    format: [prefix, year, month-name, id]
    id: 001
  date: 2023-09-01
  title: INVOICE
  use-logo: true
  logo-file: logo.svg

locale:
  currency: "$"
  separator: ","
  decimal: "."

preparer-info:
  name: Company, LLC
  address: 123 Main St., City, State 12345
  email: email@company.com
  phone: 555-555-5555
  tax-details:
    GST: 22AAAAA0000A1Z5
    LUT: AD123456789012A
    PAN: AAAAA0000A

client-info:
  name: Client, Inc.
  address: 123 Main St., City, State 12345
  email: name@client.com
  phone: 555-555-5555

payment-info:
  payment-window: 7 calendar days
  account-details: |
    Bank Name: HDFC Bank
    Account No.: 12345678901234
    IFSC Code: HDFC0001234
    SWIFT Code: HDFCINBB

charge-info:
  price:
    type: currency
  quantity: &quantity
    type: number
  qty: *quantity # alias
  rate:
    type: currency
    suffix: /hr
  hours:
    type: number
  description:
    type: string
    width: 1fr
  tax:
    type: percent
    suffix: "%"
  discount:
    type: percent
    negative: true
    suffix: "%"
  "#":
    type: index
    default: ""

Itemized Charges:
  - "#": 1
    date: September 1-30
    description: Website Design
    price: 12500
  - date: September 15
    description: Hardware
    price: 500
    quantity: 3
    tax: 7.025
  - date: September 15
    description: Voucher
    price: -100
