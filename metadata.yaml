doc-info:
  id:
    prefix: INV
    separator: /
    format: [prefix, year, month-name, id]
    id: 001
  date: 2023-09-01
  title: INVOICE
  use-logo: true
  logo-file: logo.svg

locale:
  currency: "$"
  separator: ","
  decimal: "."

style:
  font-face: Arial
  font-size: 11pt
  font-color: rgb("#111827")
  hyphenate: false
  link-color: rgb("#1d4ed8")
  accent-color: rgb("#0f4c5c")
  accent-soft-color: rgb("#e8f3f4")
  surface-color: rgb("#f8fafc")
  surface-strong-color: rgb("#eef4f8")
  border-color: rgb("#d7e1e8")
  muted-color: rgb("#5b6b79")
  title-color: rgb("#102a43")
  total-fill-color: rgb("#12344d")
  total-text-color: white
  paper: us-letter
  page-margin: 0.8in

preparer-info:
  name: Company, LLC
  address: 123 Main St., City, State 12345
  email: email@company.com
  phone: 555-555-5555
  tax-details:
    GST: 22AAAAA0000A1Z5
    LUT: AD123456789012A
    PAN: AAAAA0000A

client-info:
  name: Client, Inc.
  address: 123 Main St., City, State 12345
  email: name@client.com
  phone: 555-555-5555

payment-info:
  payment-window: 7 calendar days
  account-details:
    Bank Name: HDFC Bank
    Account No.: 12345678901234
    IFSC Code: HDFC0001234
    SWIFT Code: HDFCINBB

charge-info:
  date:
    type: string
    width: 1.1fr
  price:
    type: currency
  quantity: &quantity
    type: number
  qty: *quantity # alias
  rate:
    type: currency
    suffix: /hr
  hours:
    type: number
  description:
    type: string
    width: 1.35fr
  tax:
    type: percent
    suffix: "%"
  discount:
    type: percent
    negative: true
    suffix: "%"
  "#":
    type: index
    default: ""

Itemized Charges:
  - "#": 1
    date: September 1-30
    description: Website Design
    price: 12500
  - date: September 15
    description: Hardware
    price: 500
    quantity: 3
    tax: 7.025
  - date: September 15
    description: Voucher
    price: -100
